services:

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - API_URL=${API_URL:-http://localhost:4000}
      - IDOR_URL=${IDOR_URL:-http://localhost:5001}
      - SQLI_URL=${SQLI_URL:-http://localhost:5002}
      - XSS_URL=${XSS_URL:-http://localhost:5003}
      - JWT_URL=${JWT_URL:-http://localhost:5004}
      - PATH_URL=${PATH_URL:-http://localhost:5005}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    restart: unless-stopped

  idor-lab:
    build: ./labs/idor-lab
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - JWT_SECRET=${JWT_SECRET}
      - BACKEND_URL=http://backend:4000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - backend
    restart: unless-stopped

  sqli-lab:
    build: ./labs/sqli-lab
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - JWT_SECRET=${JWT_SECRET}
      - BACKEND_URL=http://backend:4000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - backend
    restart: unless-stopped

  xss-lab:
    build: ./labs/xss-lab
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - JWT_SECRET=${JWT_SECRET}
      - BACKEND_URL=http://backend:4000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - backend
    restart: unless-stopped

  jwt-lab:
    build: ./labs/jwt-lab
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - JWT_SECRET=${JWT_SECRET}
      - BACKEND_URL=http://backend:4000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - backend
    restart: unless-stopped

  path-traversal-lab:
    build: ./labs/path-traversal-lab
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - JWT_SECRET=${JWT_SECRET}
      - BACKEND_URL=http://backend:4000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - backend
    restart: unless-stopped