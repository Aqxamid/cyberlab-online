version: '3.9'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - API_URL=${API_URL:-http://localhost:4000}
      - IDOR_URL=${IDOR_URL:-http://localhost:5000}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    restart: unless-stopped

  idor-lab:
    build: ./labs/idor-lab
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    restart: unless-stopped
