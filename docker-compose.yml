networks:
  public:
    driver: bridge

services:

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - API_URL=${API_URL:-http://localhost:4000}
      - IDOR_URL=${IDOR_URL:-http://localhost:5001}
      - SQLI_URL=${SQLI_URL:-http://localhost:5002}
      - XSS_URL=${XSS_URL:-http://localhost:5003}
      - JWT_URL=${JWT_URL:-http://localhost:5004}
      - PATH_URL=${PATH_URL:-http://localhost:5005}
    depends_on:
      - backend
    networks:
      - public
    restart: unless-stopped
    user: "1001:1001"

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - REFRESH_SECRET=${REFRESH_SECRET:?REFRESH_SECRET is required}
      - SUPABASE_URL=${SUPABASE_URL:?SUPABASE_URL is required}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    networks:
      - public
    restart: unless-stopped
    user: "1001:1001"

  idor-lab:
    build: ./labs/idor-lab
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    networks:
      - public
    restart: unless-stopped
    user: "1001:1001"

  sqli-lab:
    build: ./labs/sqli-lab
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
    networks:
      - public
    restart: unless-stopped
    user: "1001:1001"

  xss-lab:
    build: ./labs/xss-lab
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
    networks:
      - public
    restart: unless-stopped
    user: "1001:1001"

  jwt-lab:
    build: ./labs/jwt-lab
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
    networks:
      - public
    restart: unless-stopped
    user: "1001:1001"

  path-traversal-lab:
    build: ./labs/path-traversal-lab
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
    networks:
      - public
    restart: unless-stopped
    user: "1001:1001"