<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050b12"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bgGrad)"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- >_ perfectly centered -->
  <text
    x="16"
    y="21"
    font-family="monospace"
    font-size="14"
    font-weight="bold"
    fill="#00ffff"
    filter="url(#glow)"
    text-anchor="middle"
    dominant-baseline="middle"
  >&gt;_</text>

  <!-- Corner accent dots -->
  <rect x="2.5" y="2.5" width="2" height="2" fill="#00ffff" opacity="0.5"/>
  <rect x="27.5" y="2.5" width="2" height="2" fill="#00ffff" opacity="0.5"/>
  <rect x="2.5" y="27.5" width="2" height="2" fill="#00ffff" opacity="0.5"/>
  <rect x="27.5" y="27.5" width="2" height="2" fill="#00ffff" opacity="0.5"/>
</svg>
