<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — CyberLab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/cyberlab-favicon.svg">
  <link rel="apple-touch-icon" sizes="32x32" href="/favicon-32x32.png">
    
  <style>
    body { background:#050b12; font-family:'Share Tech Mono',monospace; }
    .orbitron { font-family:'Orbitron',sans-serif; }
    .grid-bg { background-image:linear-gradient(rgba(0,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,0.03) 1px,transparent 1px);background-size:40px 40px; }
  </style>
</head>
<body class="min-h-screen grid-bg text-gray-300">
  <header class="border-b border-cyan-900/50 bg-black/50 sticky top-0 z-50 backdrop-blur-sm" id="navbar"></header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
    <div class="mb-8">
      <p class="text-yellow-600 text-xs tracking-widest uppercase mb-1">// elevated access</p>
      <h1 class="orbitron text-2xl sm:text-3xl font-black text-white">ADMIN PANEL</h1>
    </div>

    <!-- Platform stats -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10">
      <div class="bg-black/40 border border-yellow-900/30 rounded-lg p-4">
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-1">Total Users</p>
        <p class="orbitron text-3xl font-black text-yellow-400" id="a-total-users">—</p>
      </div>
      <div class="bg-black/40 border border-cyan-900/30 rounded-lg p-4">
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-1">Active (7d)</p>
        <p class="orbitron text-3xl font-black text-cyan-400" id="a-active-users">—</p>
      </div>
      <div class="bg-black/40 border border-green-900/30 rounded-lg p-4">
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-1">Labs Enabled</p>
        <p class="orbitron text-3xl font-black text-green-400" id="a-labs-enabled">—</p>
      </div>
      <div class="bg-black/40 border border-purple-900/30 rounded-lg p-4">
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-1">Success Rate</p>
        <p class="orbitron text-3xl font-black text-purple-400" id="a-success-rate">—</p>
      </div>
    </div>

    <!-- Labs management -->
    <div class="bg-black/40 border border-cyan-900/40 rounded-lg p-6 mb-8">
      <h2 class="orbitron text-sm font-bold text-white mb-5 tracking-wide">⚡ MANAGE LABS</h2>
      <div id="labs-table" class="overflow-x-auto">
        <p class="text-gray-600 text-xs">Loading labs...</p>
      </div>
    </div>

    <!-- Users table (admin only) -->
    <div id="users-section" class="hidden bg-black/40 border border-cyan-900/40 rounded-lg p-6">
      <h2 class="orbitron text-sm font-bold text-white mb-5 tracking-wide">👥 USERS</h2>
      <div id="users-table" class="overflow-x-auto">
        <p class="text-gray-600 text-xs">Loading users...</p>
      </div>
    </div>
  </main>

  <script src="/config.js"></script>
  <script src="/app.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error();
    const currentUser = Auth.getUser();
    if (!['instructor', 'admin'].includes(currentUser.role)) {
      window.location.href = '/dashboard.html';
    }
    renderNavBar();

    async function loadAll() {
      // Stats
      try {
        const stats = await apiFetch('/api/stats/admin');
        document.getElementById('a-total-users').textContent  = stats.totalUsers;
        document.getElementById('a-active-users').textContent = stats.activeUsers;
        document.getElementById('a-labs-enabled').textContent = `${stats.enabledLabs}/${stats.totalLabs}`;
        document.getElementById('a-success-rate').textContent = stats.successRate + '%';
      } catch (err) { console.error(err); }

      // Labs
      try {
        const labs = await apiFetch('/api/labs');
        renderLabsTable(labs);
      } catch (err) { console.error(err); }

      // Users (admin only)
      if (currentUser.role === 'admin') {
        document.getElementById('users-section').classList.remove('hidden');
        try {
          const users = await apiFetch('/api/users');
          renderUsersTable(users);
        } catch (err) { console.error(err); }
      }
    }

    function renderLabsTable(labs) {
      const el = document.getElementById('labs-table');
      el.innerHTML = `
        <table class="w-full text-xs">
          <thead>
            <tr class="text-gray-600 border-b border-gray-800">
              <th class="text-left pb-3">Lab</th>
              <th class="text-left pb-3">Difficulty</th>
              <th class="text-left pb-3">Points</th>
              <th class="text-left pb-3">Category</th>
              <th class="text-left pb-3">Status</th>
              <th class="text-left pb-3">Toggle</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-900/50">
            ${labs.map(lab => `
              <tr>
                <td class="py-3 text-white font-bold">${escapeHtml(lab.title)}</td>
                <td class="py-3"><span class="px-2 py-0.5 rounded border ${difficultyBadge(lab.difficulty)}">${escapeHtml(lab.difficulty)}</span></td>
                <td class="py-3 text-yellow-500">${escapeHtml(String(lab.points))}</td>
                <td class="py-3 text-gray-500">${escapeHtml(lab.category)}</td>
                <td class="py-3">
                  <span class="text-xs ${lab.enabled ? 'text-green-400' : 'text-red-500'}">${lab.enabled ? '● Active' : '○ Disabled'}</span>
                </td>
                <td class="py-3">
                  <button
                    onclick="toggleLab('${escapeHtml(lab.uuid)}')"
                    class="text-xs border ${lab.enabled ? 'border-red-700 text-red-400 hover:bg-red-900/20' : 'border-green-700 text-green-400 hover:bg-green-900/20'} px-3 py-1 rounded transition-colors"
                    id="toggle-${escapeHtml(lab.uuid)}">
                    ${lab.enabled ? 'Disable' : 'Enable'}
                  </button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function toggleLab(uuid) {
      const btn = document.getElementById(`toggle-${uuid}`);
      btn.textContent = '...';
      btn.disabled = true;
      try {
        await apiFetch(`/api/labs/${uuid}/toggle`, { method: 'PATCH' });
        showToast('Lab status updated', 'success');
        const labs = await apiFetch('/api/labs');
        renderLabsTable(labs);
      } catch (err) {
        showToast(err.message || 'Failed to toggle lab', 'error');
        btn.disabled = false;
      }
    }

    function renderUsersTable(users) {
      const el = document.getElementById('users-table');
      el.innerHTML = `
        <table class="w-full text-xs">
          <thead>
            <tr class="text-gray-600 border-b border-gray-800">
              <th class="text-left pb-3">Username</th>
              <th class="text-left pb-3">Email</th>
              <th class="text-left pb-3">Role</th>
              <th class="text-left pb-3">Joined</th>
              <th class="text-left pb-3">Change Role</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-900/50">
            ${users.map(u => `
              <tr>
                <td class="py-3 text-white">${escapeHtml(u.username)}</td>
                <td class="py-3 text-gray-500">${escapeHtml(u.email)}</td>
                <td class="py-3">
                  <span class="px-2 py-0.5 rounded border text-xs ${roleBadge(u.role)}">${escapeHtml(u.role)}</span>
                </td>
                <td class="py-3 text-gray-600">${new Date(u.created_at).toLocaleDateString()}</td>
                <td class="py-3">
                  <select
                    onchange="changeRole('${escapeHtml(u.uuid)}', this)"
                    data-prev="${escapeHtml(u.role)}"
                    class="text-xs bg-black/60 border border-gray-700 rounded px-2 py-1 text-gray-300 focus:outline-none focus:border-cyan-600 transition-colors"
                  >
                    <option value="student"    ${u.role === 'student'    ? 'selected' : ''}>student</option>
                    <option value="instructor" ${u.role === 'instructor' ? 'selected' : ''}>instructor</option>
                    <option value="admin"      ${u.role === 'admin'      ? 'selected' : ''}>admin</option>
                  </select>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function changeRole(uuid, select) {
      const newRole = select.value;
      const prev    = select.dataset.prev;
      select.disabled = true;
      try {
        await apiFetch(`/api/users/${uuid}/role`, {
          method: 'PATCH',
          body:   JSON.stringify({ role: newRole }),
        });
        select.dataset.prev = newRole;
        showToast(`Role updated to ${newRole}`, 'success');
      } catch (err) {
        select.value    = prev; // revert on failure
        showToast(err.message || 'Failed to update role', 'error');
      } finally {
        select.disabled = false;
      }
    }

    loadAll();
  </script>
</body>
</html>
