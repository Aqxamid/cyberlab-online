<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labs — CyberLab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/cyberlab-favicon.svg">
  <link rel="apple-touch-icon" sizes="32x32" href="/favicon-32x32.png">
    
  <style>
    body { background:#050b12; font-family:'Share Tech Mono',monospace; }
    .orbitron { font-family:'Orbitron',sans-serif; }
    .grid-bg { background-image:linear-gradient(rgba(0,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,0.03) 1px,transparent 1px);background-size:40px 40px; }
    .lab-card { background:rgba(0,0,0,0.45); border:1px solid rgba(0,255,255,0.1); transition:all 0.2s; cursor:pointer; }
    .lab-card:hover { border-color:rgba(0,255,255,0.4); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,255,255,0.07); }
    .lab-card.completed { border-color:rgba(0,255,100,0.3); }
    .lab-card.disabled { opacity:0.5; cursor:not-allowed; pointer-events:none; }
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn 0.3s ease forwards;}
  </style>
</head>
<body class="min-h-screen grid-bg text-gray-300">

<header class="border-b border-cyan-900/50 bg-black/50 sticky top-0 z-50 backdrop-blur-sm" id="navbar"></header>

<main class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
  <div class="mb-8 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
    <div>
      <p class="text-cyan-600 text-xs tracking-widest uppercase mb-1">// vulnerability labs</p>
      <h1 class="orbitron text-2xl sm:text-3xl font-black text-white">LABS</h1>
    </div>
    <!-- Filter -->
    <div class="flex items-center gap-2 flex-wrap">
      <button onclick="setFilter('all')" id="filter-all" class="filter-btn active text-xs px-3 py-1.5 rounded border border-cyan-600 text-cyan-400 bg-cyan-500/10">All</button>
      <button onclick="setFilter('beginner')" id="filter-beginner" class="filter-btn text-xs px-3 py-1.5 rounded border border-gray-700 text-gray-400 hover:border-green-600 hover:text-green-400 transition-colors">Beginner</button>
      <button onclick="setFilter('intermediate')" id="filter-intermediate" class="filter-btn text-xs px-3 py-1.5 rounded border border-gray-700 text-gray-400 hover:border-yellow-600 hover:text-yellow-400 transition-colors">Intermediate</button>
      <button onclick="setFilter('advanced')" id="filter-advanced" class="filter-btn text-xs px-3 py-1.5 rounded border border-gray-700 text-gray-400 hover:border-red-600 hover:text-red-400 transition-colors">Advanced</button>
    </div>
  </div>

  <div id="labs-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
    <!-- skeleton -->
    <div class="lab-card rounded-lg p-6 animate-pulse"><div class="h-4 bg-gray-800 rounded mb-3 w-3/4"></div><div class="h-3 bg-gray-800 rounded mb-2"></div><div class="h-3 bg-gray-800 rounded w-1/2"></div></div>
    <div class="lab-card rounded-lg p-6 animate-pulse"><div class="h-4 bg-gray-800 rounded mb-3 w-2/3"></div><div class="h-3 bg-gray-800 rounded mb-2"></div><div class="h-3 bg-gray-800 rounded w-1/2"></div></div>
  </div>
</main>

<script src="/config.js"></script>
<script src="/app.js"></script>
<script>
  if (!Auth.requireAuth()) throw new Error();
  renderNavBar();

  let allLabs = [];
  let currentFilter = 'all';

  const categoryIcon = {
    'Web Security': '🌐',
    'Authentication': '🔑',
    'Server Security': '🖥️'
  };

  async function loadLabs() {
    try {
      const data = await apiFetch('/api/labs');
      // FIX: API returns a bare array — handle both bare array and wrapped {labs:[]} shape
      allLabs = Array.isArray(data) ? data : (Array.isArray(data?.labs) ? data.labs : []);
      renderLabs();
    } catch (err) {
      showToast('Failed to load labs', 'error');
      document.getElementById('labs-grid').innerHTML =
        '<p class="text-gray-600 text-sm col-span-3">Could not load labs. Please refresh the page.</p>';
    }
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn text-xs px-3 py-1.5 rounded border border-gray-700 text-gray-400 hover:border-cyan-600 hover:text-cyan-400 transition-colors';
    });
    const active = document.getElementById('filter-' + f);
    active.className = 'filter-btn active text-xs px-3 py-1.5 rounded border border-cyan-600 text-cyan-400 bg-cyan-500/10';
    renderLabs();
  }

  function renderLabs() {
    const grid = document.getElementById('labs-grid');
    const labs = currentFilter === 'all' ? allLabs : allLabs.filter(l => l.difficulty === currentFilter);

    if (labs.length === 0) {
      grid.innerHTML = '<p class="text-gray-600 text-sm col-span-3">No labs match this filter.</p>';
      return;
    }

    grid.innerHTML = labs.map((lab, i) => {
      const isDisabled = !lab.enabled;
      // FIX: disabled cards get .disabled class (pointer-events:none) and no onclick
      const cardClass = `lab-card rounded-lg p-6 fade-in ${lab.completed ? 'completed' : ''} ${isDisabled ? 'disabled' : ''}`;
      const clickAttr = isDisabled ? '' : `onclick="window.location.href='/labroom.html?slug=${lab.slug}'"`;

      return `
        <div class="${cardClass}" style="animation-delay:${i * 0.05}s" ${clickAttr}>
          <div class="flex items-start justify-between mb-3">
            <span class="text-2xl">${categoryIcon[lab.category] || '🔒'}</span>
            <div class="flex items-center gap-2">
              ${lab.completed ? '<span class="text-green-400 text-xs">✓ Done</span>' : ''}
              ${isDisabled ? '<span class="text-red-500 text-xs">Disabled</span>' : ''}
            </div>
          </div>
          <h3 class="orbitron text-sm font-bold text-white mb-2 leading-tight">${lab.title}</h3>
          <p class="text-gray-500 text-xs leading-relaxed mb-4 line-clamp-2">${lab.description}</p>
          <div class="flex items-center justify-between">
            <span class="text-xs px-2 py-0.5 rounded border ${difficultyBadge(lab.difficulty)}">${lab.difficulty}</span>
            <span class="text-yellow-500 text-xs font-bold">${lab.points} pts</span>
          </div>
        </div>
      `;
    }).join('');
  }

  loadLabs();
</script>
</body>
</html>
